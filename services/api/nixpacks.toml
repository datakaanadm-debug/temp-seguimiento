# Nixpacks build config para Railway — Senda API (Laravel 11 + PostgreSQL).
#
# Por defecto Railpack detecta el package.json raíz del monorepo y trata el
# proyecto como Node. Este archivo + setear "Root Directory = services/api"
# en el servicio de Railway hacen que se construya correctamente como PHP.
#
# Tres servicios separados en Railway leen este mismo repo (todos con
# Root Directory = services/api), cambian solo el `start` command:
#   - api    → php-fpm sirviendo public/ (este default)
#   - queue  → override start = "php artisan queue:work --tries=2 --max-time=3600"
#   - reverb → override start = "php artisan reverb:start --host=0.0.0.0 --port=$PORT"

[phases.setup]
nixPkgs = [
  "php82",
  "php82Packages.composer",
  # Extensiones PHP necesarias por Laravel + nuestro stack
  "php82Extensions.pdo_pgsql",
  "php82Extensions.pgsql",
  "php82Extensions.mbstring",
  "php82Extensions.xml",
  "php82Extensions.curl",
  "php82Extensions.bcmath",
  "php82Extensions.intl",
  "php82Extensions.gd",
  "php82Extensions.zip",
  "php82Extensions.opcache",
]

[phases.install]
cmds = [
  # bootstrap/cache puede no existir en el clone (el .gitignore parent solo
  # versiona el .gitkeep). PackageManifest::write() necesita que exista y
  # sea writable o el primer request muere con HTTP 500.
  "mkdir -p bootstrap/cache storage/framework/cache storage/framework/sessions storage/framework/views storage/logs storage/app/private",
  "chmod -R 0775 bootstrap/cache storage",
  "composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist",
]

[phases.build]
# Cachea routes/views (no dependen de runtime envs).
#
# IMPORTANTE: NO cacheamos config en build porque Railway no garantiza
# que las env vars (APP_KEY, SESSION_*, DB_*, SANCTUM_*) estén disponibles
# en build phase. Si cacheás acá con envs faltantes/default, el deploy
# corre con SESSION_SAME_SITE=lax y SECURE=null por toda la vida del
# container → cookies cross-site no se setean → 419 eterno.
# config:cache se mueve al start command (ver abajo).
cmds = [
  "php artisan route:cache",
  "php artisan view:cache",
  "chmod -R 0775 bootstrap/cache storage",
]

[start]
# Orden de boot:
#   1. config:clear → tira el cache si quedó algo de un deploy anterior
#   2. config:cache → re-cachea con las envs runtime YA disponibles
#   3. migrate     → corre migrations (idempotente)
#   4. php -S      → arranca el server built-in
cmd = "php artisan config:clear && php artisan config:cache && php artisan migrate --force && php -S 0.0.0.0:$PORT -t public"
